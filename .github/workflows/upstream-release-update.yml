name: Upstream Release Update

on:
  schedule:
    # Check once a day for a new upstream release.
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: "GitHub repository to monitor"
        required: false
        default: "rahilp/second-brain-cloudflare"
      test_notification:
        description: "Send a test release email when no update is needed"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: upstream-release-update
  cancel-in-progress: false

jobs:
  update-from-upstream-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      update_applied: ${{ steps.update.outputs.needed }}
      release_tag: ${{ steps.release.outputs.tag_name }}
      release_name: ${{ steps.release.outputs.release_name }}
      release_url: ${{ steps.release.outputs.release_url }}
    env:
      UPSTREAM_REPO: ${{ github.event.inputs.upstream_repo || 'rahilp/second-brain-cloudflare' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find latest upstream app release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if ! releases_json="$(gh api "repos/${UPSTREAM_REPO}/releases?per_page=100" 2>/tmp/upstream-release-error.log)"; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No upstream GitHub release found for ${UPSTREAM_REPO}; nothing to update."
            cat /tmp/upstream-release-error.log
            exit 0
          fi

          # The repository also publishes installer-v* desktop releases. Follow
          # only stable app versions such as v2.0.0, v1.6, or 1.5.1.
          release_json="$(jq -c '
            map(select(
              (.draft | not) and
              (.prerelease | not) and
              (.tag_name | test("^v?[0-9]+(\\.[0-9]+){1,2}$"))
            )) | first // empty
          ' <<< "$releases_json")"
          if [[ -z "$release_json" ]]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No stable upstream app release found for ${UPSTREAM_REPO}; nothing to update."
            exit 0
          fi

          tag_name="$(jq -r '.tag_name' <<< "$release_json")"
          release_name="$(jq -r '.name // .tag_name' <<< "$release_json")"
          release_url="$(jq -r '.html_url' <<< "$release_json")"
          branch_name="upstream-release/${tag_name//[^A-Za-z0-9._-]/-}"

          {
            echo "found=true"
            echo "tag_name=$tag_name"
            echo "release_name=$release_name"
            echo "release_url=$release_url"
            echo "branch_name=$branch_name"
          } >> "$GITHUB_OUTPUT"

      - name: Fetch upstream tag
        if: steps.release.outputs.found == 'true'
        run: |
          set -euo pipefail
          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch upstream "refs/tags/${{ steps.release.outputs.tag_name }}:refs/tags/${{ steps.release.outputs.tag_name }}"

      - name: Check whether update is needed
        if: steps.release.outputs.found == 'true'
        id: update
        run: |
          set -euo pipefail

          if git merge-base --is-ancestor "${{ steps.release.outputs.tag_name }}" HEAD; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "Current branch already contains ${{ steps.release.outputs.tag_name }}."
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create update branch
        if: steps.update.outputs.needed == 'true'
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          base_sha="$(git rev-parse HEAD)"
          git checkout -B "${{ steps.release.outputs.branch_name }}"
          git merge --no-edit "${{ steps.release.outputs.tag_name }}"

          # Deployment and update automation belong to this fork. Keeping the
          # local versions also prevents GitHub's workflow-file push restriction
          # from blocking otherwise valid upstream app updates.
          git restore --source="$base_sha" --staged --worktree -- .github/workflows
          if ! git diff --cached --quiet; then
            git commit --amend --no-edit
          fi

      - name: Setup Node
        if: steps.update.outputs.needed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        if: steps.update.outputs.needed == 'true'
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        if: steps.update.outputs.needed == 'true'
        run: npm run typecheck

      - name: Test
        if: steps.update.outputs.needed == 'true'
        run: npm run test

      - name: Publish tested release
        if: steps.update.outputs.needed == 'true'
        run: |
          set -euo pipefail

          git push --force-with-lease origin "HEAD:${{ steps.release.outputs.branch_name }}"
          git push origin "HEAD:main"

          {
            echo "### Applied upstream release ${{ steps.release.outputs.tag_name }}"
            echo
            echo "Source: ${{ steps.release.outputs.release_url }}"
            echo
            echo "Typecheck and tests passed before the release was pushed to main."
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-upstream-release:
    needs: update-from-upstream-release
    if: needs.update-from-upstream-release.outputs.update_applied == 'true'
    uses: ./.github/workflows/deploy-cloudflare.yml
    with:
      ref: main
    secrets: inherit

  notify-upstream-release:
    needs:
      - update-from-upstream-release
      - deploy-upstream-release
    if: >-
      always() &&
      (
        (
          needs.update-from-upstream-release.outputs.update_applied == 'true' &&
          needs.deploy-upstream-release.result == 'success'
        ) ||
        (
          github.event_name == 'workflow_dispatch' &&
          inputs.test_notification == true &&
          needs.update-from-upstream-release.outputs.update_applied != 'true'
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Email applied release
        env:
          SECOND_BRAIN_URL: ${{ secrets.SECOND_BRAIN_URL }}
          SECOND_BRAIN_TOKEN: ${{ secrets.SECOND_BRAIN_TOKEN }}
          RELEASE_TAG: ${{ needs.update-from-upstream-release.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.update-from-upstream-release.outputs.release_name }}
          RELEASE_URL: ${{ needs.update-from-upstream-release.outputs.release_url }}
          IS_TEST: ${{ needs.update-from-upstream-release.outputs.update_applied != 'true' }}
        run: |
          set -euo pipefail

          missing=0
          for name in SECOND_BRAIN_URL SECOND_BRAIN_TOKEN RELEASE_TAG RELEASE_NAME RELEASE_URL; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required value: ${name}"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

          payload="$(jq -n \
            --arg release_tag "$RELEASE_TAG" \
            --arg release_name "$RELEASE_NAME" \
            --arg release_url "$RELEASE_URL" \
            --argjson test "$IS_TEST" \
            '{
              releaseTag: $release_tag,
              releaseName: $release_name,
              releaseUrl: $release_url,
              test: $test
            }')"

          response_file="$(mktemp)"
          status="$(curl --silent --show-error \
            --output "$response_file" \
            --write-out '%{http_code}' \
            --request POST \
            --header "Authorization: Bearer ${SECOND_BRAIN_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "$payload" \
            "${SECOND_BRAIN_URL%/}/internal/release-notification")"

          if [[ "$status" -lt 200 || "$status" -ge 300 ]] || ! jq -e '.ok == true' "$response_file" >/dev/null; then
            echo "::error::Release notification failed with HTTP ${status}"
            cat "$response_file"
            exit 1
          fi

          message_id="$(jq -r '.messageId // "unknown"' "$response_file")"
          {
            if [[ "$IS_TEST" == "true" ]]; then
              echo "### Release notification test delivered"
            else
              echo "### Emailed applied release ${RELEASE_TAG}"
            fi
            echo
            echo "Recipient: dan@infoaddict.net"
            echo
            echo "Release notes: ${RELEASE_URL}"
            echo
            echo "Cloudflare message ID: ${message_id}"
          } >> "$GITHUB_STEP_SUMMARY"
