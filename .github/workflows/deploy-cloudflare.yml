name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to deploy"
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Write deploy Wrangler config
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          OAUTH_KV_NAMESPACE_ID: ${{ secrets.OAUTH_KV_NAMESPACE_ID }}
        run: |
          set -euo pipefail

          missing=0
          for name in CLOUDFLARE_ACCOUNT_ID D1_DATABASE_ID OAUTH_KV_NAMESPACE_ID; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required GitHub secret: ${name}"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

          jq \
            --arg account_id "$CLOUDFLARE_ACCOUNT_ID" \
            --arg database_id "$D1_DATABASE_ID" \
            --arg oauth_kv_id "$OAUTH_KV_NAMESPACE_ID" \
            '.account_id = $account_id
              | .d1_databases |= map(
                  if .binding == "DB" then .database_id = $database_id else . end
                )
              | .kv_namespaces |= map(
                  if .binding == "OAUTH_KV" then .id = $oauth_kv_id else . end
                )' \
            wrangler.jsonc > wrangler.deploy.json

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            echo "::error::Missing required GitHub secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi

          npx wrangler deploy --config wrangler.deploy.json

      - name: Restore required Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SECOND_BRAIN_TOKEN: ${{ secrets.SECOND_BRAIN_TOKEN }}
          RELEASE_NOTIFY_TOKEN: ${{ secrets.RELEASE_NOTIFY_TOKEN }}
        run: |
          set -euo pipefail

          missing=0
          for name in CLOUDFLARE_API_TOKEN SECOND_BRAIN_TOKEN RELEASE_NOTIFY_TOKEN; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required GitHub secret: ${name}"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

          printf '%s' "$SECOND_BRAIN_TOKEN" \
            | npx wrangler secret put AUTH_TOKEN --config wrangler.deploy.json
          printf '%s' "$RELEASE_NOTIFY_TOKEN" \
            | npx wrangler secret put RELEASE_NOTIFY_TOKEN --config wrangler.deploy.json
